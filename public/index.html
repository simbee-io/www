<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simbee</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 520px;
      padding: 2rem;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    .logo span { color: #a78bfa; }
    .tagline {
      font-size: 1.125rem;
      color: #a1a1aa;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #71717a;
      border: 1px solid #27272a;
      border-radius: 9999px;
      padding: 0.5rem 1rem;
    }
    .status .dot {
      width: 8px;
      height: 8px;
      background: #a78bfa;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.75rem;
      color: #3f3f46;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">sim<span>bee</span></div>
    <p class="tagline">Discovery and matching platform for modern applications.</p>
    <div class="status">
      <span class="dot"></span>
      Coming soon
    </div>
  </div>
  <footer>&copy; 2026 Simbee</footer>
</body>
</html>
